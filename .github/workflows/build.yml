name: Build Budget App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller Budget.spec --noconfirm

      - name: Package distributable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\BudgetApp
          Copy-Item dist\Budget.exe dist\BudgetApp\Budget.exe
          Copy-Item Budget.ico dist\BudgetApp\Budget.ico
          New-Item -ItemType Directory -Path dist\BudgetApp\statements\credit
          New-Item -ItemType Directory -Path dist\BudgetApp\statements\debit
          New-Item -ItemType Directory -Path dist\BudgetApp\statements\investments
          New-Item -ItemType Directory -Path dist\BudgetApp\output
          python build_defaults.py dist\BudgetApp
          Compress-Archive -Path dist\BudgetApp -DestinationPath dist\Budget-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Budget-Windows
          path: dist/Budget-Windows.zip
          retention-days: 90

  # ── macOS Apple Silicon (M1/M2/M3/M4) ────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build app
        run: pyinstaller Budget.spec --noconfirm

      - name: Package distributable
        run: |
          mkdir -p dist/BudgetApp
          cp -r "dist/Budget.app" dist/BudgetApp/
          mkdir -p dist/BudgetApp/statements/credit
          mkdir -p dist/BudgetApp/statements/debit
          mkdir -p dist/BudgetApp/statements/investments
          mkdir -p dist/BudgetApp/output
          cp Budget.ico dist/BudgetApp/Budget.ico
          python3 build_defaults.py dist/BudgetApp
          cd dist && zip -r Budget-Mac-AppleSilicon.zip BudgetApp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Budget-Mac-AppleSilicon
          path: dist/Budget-Mac-AppleSilicon.zip
          retention-days: 90

  # ── macOS Intel (2019 and older Macs) ────────────────────────────────────────
  build-macos-intel:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build app
        run: pyinstaller Budget.spec --noconfirm

      - name: Package distributable
        run: |
          mkdir -p dist/BudgetApp
          cp -r "dist/Budget.app" dist/BudgetApp/
          mkdir -p dist/BudgetApp/statements/credit
          mkdir -p dist/BudgetApp/statements/debit
          mkdir -p dist/BudgetApp/statements/investments
          mkdir -p dist/BudgetApp/output
          cp Budget.ico dist/BudgetApp/Budget.ico
          python3 build_defaults.py dist/BudgetApp
          cd dist && zip -r Budget-Mac-Intel.zip BudgetApp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Budget-Mac-Intel
          path: dist/Budget-Mac-Intel.zip
          retention-days: 90

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: Budget-Windows
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: Budget-Mac-AppleSilicon
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: Budget-Mac-Intel
          path: release/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Budget App — Latest"
          body: |
            ## Download

            | Platform | File | For |
            |---|---|---|
            | Windows | Budget-Windows.zip | All Windows PCs |
            | Mac (Apple Silicon) | Budget-Mac-AppleSilicon.zip | M1/M2/M3/M4 Macs (2020 and newer) |
            | Mac (Intel) | Budget-Mac-Intel.zip | Intel Macs (2019 and older) |

            **Not sure which Mac you have?** Apple menu → About This Mac → look for "Apple M" (Silicon) or "Intel" in the chip/processor line.

            Unzip, double-click `Budget.app` (Mac) or `Budget.exe` (Windows).
            The app opens in your browser automatically.

            > **Mac note:** On first launch right-click → Open → Open Anyway to bypass Gatekeeper.
          files: |
            release/Budget-Windows.zip
            release/Budget-Mac-AppleSilicon.zip
            release/Budget-Mac-Intel.zip
          make_latest: true
